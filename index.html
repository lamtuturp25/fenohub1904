<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
    }

    input, select, button {
      padding: 5px;
      margin: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #f2f2f2;
    }

    a {
      text-decoration: none;
      color: blue;
    }

    .date-col {
      width: 120px;
      white-space: nowrap;
    }

    .artikel-col {
      max-width: 400px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- FILTER -->
<input type="text" id="keyword" placeholder="Search keyword">

<select id="lapus">
  <option value="">All Lapangan Usaha</option>
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="D">D</option>
  <option value="E">E</option>
  <option value="F">F</option>
  <option value="G">G</option>
  <option value="H">H</option>
  <option value="I">I</option>
  <option value="J">J</option>
  <option value="K">K</option>
  <option value="L">L</option>
  <option value="MN">MN</option>
  <option value="O">O</option>
  <option value="P">P</option>
  <option value="Q">Q</option>
  <option value="RSTU">RSTU</option>
</select>

<button onclick="filterData()">Search</button>
<button onclick="resetData()">Reset</button>

<p id="info"></p>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th class="date-col">Date</th>
      <th>Title</th>
      <th class="artikel-col">Artikel</th>
      <th>Lapus</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
let data = [];

// =====================
// LOAD DATA
// =====================
fetch("data.json")
  .then(res => res.json())
  .then(json => {
    data = json;

    data.sort((a, b) => b.date.localeCompare(a.date));

    showDefault();
  });

// =====================
// DEFAULT VIEW
// =====================
function showDefault() {
  if (data.length === 0) return;

  const latestMonth = data[0].date.slice(0, 7);

  let latestData = data.filter(d => d.date.startsWith(latestMonth));

  renderTable(latestData.slice(0, 15));

  document.getElementById("info").innerText =
    "Menampilkan 15 berita terbaru (" + latestMonth + ")";
}

// =====================
// FILTER
// =====================
function filterData() {
  const keyword = document.getElementById("keyword").value.toLowerCase();
  const lapus = document.getElementById("lapus").value;

  let filtered = data.filter(d => {
    return (
      (!keyword || d.title.toLowerCase().includes(keyword)) &&
      (!lapus || d.lapus === lapus)
    );
  });

  renderTable(filtered);

  document.getElementById("info").innerText =
    "Ditemukan " + filtered.length + " berita";
}

// =====================
// RESET
// =====================
function resetData() {
  document.getElementById("keyword").value = "";
  document.getElementById("lapus").value = "";

  showDefault();
}

// =====================
// POTONG ARTIKEL (2-3 kalimat)
// =====================
function shortenText(text) {
  if (!text) return "";

  let sentences = text.split(".");
  let short = sentences.slice(0, 3).join(".");

  return short + "...";
}

// =====================
// COPY TEXT
// =====================
function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Artikel berhasil dicopy!");
}

// =====================
// SHOW FULL ARTIKEL
// =====================
function showFull(text) {
  alert(text);
}

// =====================
// RENDER TABLE
// =====================
function renderTable(rows) {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";

  rows.forEach((d, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td class="date-col">${d.date}</td>
        <td><a href="${d.link}" target="_blank">${d.title}</a></td>
        <td class="artikel-col">${shortenText(d.artikel)}</td>
        <td>${d.lapus}</td>
        <td>
          <button onclick="copyText(\`${d.artikel}\`)">Copy</button>
          <button onclick="showFull(\`${d.artikel}\`)">See Full</button>
        </td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
