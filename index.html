<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- Excel Library -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin: 10px; }

input, select, button {
  padding: 5px;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  vertical-align: top;
}

th { background: #f2f2f2; }

.date-col { width: 120px; white-space: nowrap; }
.artikel-col { max-width: 400px; }

.pagination { margin-top: 10px; }

button { cursor: pointer; }
</style>
</head>

<body>

<!-- FILTER -->
<input type="text" id="keyword" placeholder="Keyword">

<input type="date" id="date_from">
<input type="date" id="date_to">

<select id="lapus">
<option value="">All Lapus</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
<option value="F">F</option>
<option value="G">G</option>
<option value="H">H</option>
<option value="I">I</option>
<option value="J">J</option>
<option value="K">K</option>
<option value="L">L</option>
<option value="MN">MN</option>
<option value="O">O</option>
<option value="P">P</option>
<option value="Q">Q</option>
<option value="RSTU">RSTU</option>
</select>

<button onclick="applyFilter()">Search</button>
<button onclick="resetData()">Reset</button>
<button onclick="exportExcel()">📥 Export Excel</button>

<p id="info"></p>

<table>
<thead>
<tr>
<th>No</th>
<th class="date-col">Date</th>
<th>Title</th>
<th class="artikel-col">Artikel</th>
<th>Lapus</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">⬅️</button>
<span id="page-info"></span>
<button onclick="nextPage()">➡️</button>
</div>

<script>
let data = [];
let filteredData = [];
let currentPage = 1;
const perPage = 15;

// =====================
// LOAD DATA
// =====================
fetch("data.json")
.then(res => res.json())
.then(json => {
  data = json;
  data.sort((a,b)=> b.date.localeCompare(a.date));
  showDefault();
});

// =====================
// DEFAULT VIEW
// =====================
function showDefault(){
  if(data.length === 0) return;

  const latestMonth = data[0].date.slice(0,7);

  filteredData = data.filter(d => d.date.startsWith(latestMonth));
  currentPage = 1;

  renderPage();

  document.getElementById("info").innerText =
    "Menampilkan bulan terbaru ("+latestMonth+")";
}

// =====================
// FILTER
// =====================
function applyFilter(){
  const keyword = document.getElementById("keyword").value.toLowerCase();
  const lapus = document.getElementById("lapus").value;
  const from = document.getElementById("date_from").value;
  const to = document.getElementById("date_to").value;

  filteredData = data.filter(d => {
    return (
      (!keyword || d.title.toLowerCase().includes(keyword)) &&
      (!lapus || d.lapus === lapus) &&
      (!from || d.date >= from) &&
      (!to || d.date <= to)
    );
  });

  currentPage = 1;
  renderPage();

  document.getElementById("info").innerText =
    "Ditemukan "+filteredData.length+" berita";
}

// =====================
// RESET
// =====================
function resetData(){
  document.getElementById("keyword").value="";
  document.getElementById("lapus").value="";
  document.getElementById("date_from").value="";
  document.getElementById("date_to").value="";

  showDefault();
}

// =====================
// PAGINATION
// =====================
function renderPage(){
  const start = (currentPage-1)*perPage;
  const end = start + perPage;

  const pageData = filteredData.slice(start,end);

  renderTable(pageData);

  document.getElementById("page-info").innerText =
    "Page "+currentPage+" / "+Math.max(1, Math.ceil(filteredData.length/perPage));
}

function nextPage(){
  if(currentPage*perPage < filteredData.length){
    currentPage++;
    renderPage();
  }
}

function prevPage(){
  if(currentPage>1){
    currentPage--;
    renderPage();
  }
}

// =====================
// SHORT TEXT
// =====================
function shortenText(text){
  if(!text) return "";
  let s = text.split(".");
  return s.slice(0,3).join(".") + "...";
}

// =====================
// COPY
// =====================
function copyText(encoded){
  const text = decodeURIComponent(encoded);
  navigator.clipboard.writeText(text);
  alert("✅ Artikel berhasil dicopy");
}

// =====================
// FULL TEXT
// =====================
function showFull(encoded){
  const text = decodeURIComponent(encoded);
  alert(text);
}

// =====================
// RENDER TABLE
// =====================
function renderTable(rows){
  const tbody = document.getElementById("table-body");
  tbody.innerHTML="";

  rows.forEach((d,i)=>{
    const encoded = encodeURIComponent(d.artikel);

    tbody.innerHTML += `
    <tr>
      <td>${(currentPage-1)*perPage + i + 1}</td>
      <td class="date-col">${d.date}</td>
      <td><a href="${d.link}" target="_blank">${d.title}</a></td>
      <td class="artikel-col">${shortenText(d.artikel)}</td>
      <td>${d.lapus}</td>
      <td>
        <button onclick="copyText('${encoded}')">📋</button>
        <button onclick="showFull('${encoded}')">👁️</button>
      </td>
    </tr>`;
  });
}

// =====================
// EXPORT EXCEL
// =====================
function exportExcel(){
  let ws = XLSX.utils.json_to_sheet(filteredData);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Berita");

  XLSX.writeFile(wb, "export_berita.xlsx");
}
</script>

</body>
</html>
