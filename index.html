<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin: 10px; }

input, select, button {
  padding: 6px;
  margin: 5px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  vertical-align: top;
}

th { background: #f2f2f2; }

/* WIDTH */
th:nth-child(1){width:40px;}
th:nth-child(2){width:110px;}
th:nth-child(3){width:200px;}
th:nth-child(4){width:420px;}
th:nth-child(5){width:220px;}
th:nth-child(6){width:110px;}

td { word-wrap: break-word; }

.expand-row { background:#fafafa; }

button { cursor:pointer; }

/* Hover biar terasa interaktif */
button:hover {
  background-color: #f0f0f0;
}

/* PAGINATION */
.pagination { margin-top:10px; }

/* MOBILE */
@media (max-width:768px){
  table, thead, tbody, th, td, tr { display:block; }
  thead{display:none;}

  tr{
    margin-bottom:10px;
    border:1px solid #ddd;
    padding:10px;
    border-radius:8px;
  }

  td{border:none;}

  td::before{
    font-weight:bold;
    display:block;
    color:#555;
  }

  td:nth-child(1)::before{content:"No";}
  td:nth-child(2)::before{content:"Date";}
  td:nth-child(3)::before{content:"Title";}
  td:nth-child(4)::before{content:"Artikel";}
  td:nth-child(5)::before{content:"Lapus";}
  td:nth-child(6)::before{content:"Aksi";}
}
</style>
</head>

<body>

<!-- FILTER -->
<input type="text" id="keyword" placeholder="Keyword">

<input type="date" id="date_from" onchange="handleDateFrom()">
<input type="date" id="date_to" disabled>

<select id="lapus">
<option value="">All Lapus</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
<option value="F">F</option>
<option value="G">G</option>
<option value="H">H</option>
<option value="I">I</option>
<option value="J">J</option>
<option value="K">K</option>
<option value="L">L</option>
<option value="MN">MN</option>
<option value="O">O</option>
<option value="P">P</option>
<option value="Q">Q</option>
<option value="RSTU">RSTU</option>
</select>

<button onclick="applyFilter()">Search</button>
<button onclick="resetData()">Reset</button>
<button onclick="exportExcel()">📥 Export</button>

<p id="info"></p>

<table>
<thead>
<tr>
<th>No</th>
<th>Date</th>
<th>Title</th>
<th>Artikel</th>
<th>Lapus</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">⬅️</button>
<span id="page-info"></span>
<button onclick="nextPage()">➡️</button>
</div>

<script>
let data=[];
let filteredData=[];
let currentPage=1;
const perPage=15;

// =====================
// LAPUS MAPPING
// =====================
const lapusMap = {
"A":"Pertanian, Kehutanan, dan Perikanan",
"B":"Pertambangan dan Penggalian",
"C":"Industri Pengolahan",
"D":"Pengadaan Listrik dan Gas",
"E":"Pengadaan Air & Pengelolaan Sampah",
"F":"Konstruksi",
"G":"Perdagangan Besar & Eceran",
"H":"Transportasi & Pergudangan",
"I":"Akomodasi & Makan Minum",
"J":"Informasi dan Komunikasi",
"K":"Jasa Keuangan",
"L":"Real Estate",
"MN":"Jasa Perusahaan",
"O":"Administrasi Pemerintahan",
"P":"Pendidikan",
"Q":"Kesehatan & Kegiatan Sosial",
"RSTU":"Jasa Lainnya"
};

function getLapusFull(code){
  return code + " - " + (lapusMap[code] || code);
}

// =====================
// LOAD
// =====================
fetch("data.json")
.then(res=>res.json())
.then(json=>{
  data=json;
  data.sort((a,b)=>b.date.localeCompare(a.date));
  showDefault();
});

// DEFAULT
function showDefault(){
  const latest=data[0].date.slice(0,7);
  filteredData=data.filter(d=>d.date.startsWith(latest));
  currentPage=1;
  renderPage();
}

// DATE CONTROL
function handleDateFrom(){
  const from=document.getElementById("date_from").value;
  const to=document.getElementById("date_to");

  if(from){
    to.disabled=false;
    to.min=from;
    to.max=data[0].date;

    if(!to.value || to.value<from){
      to.value=from;
    }
  }
}

// FILTER
function applyFilter(){
  const keyword=document.getElementById("keyword").value.toLowerCase();
  const lapus=document.getElementById("lapus").value;
  const from=document.getElementById("date_from").value;
  const to=document.getElementById("date_to").value;

  filteredData=data.filter(d=>{
    return(
      (!keyword||d.title.toLowerCase().includes(keyword)) &&
      (!lapus||d.lapus===lapus) &&
      (!from||d.date>=from) &&
      (!to||d.date<=to)
    );
  });

  currentPage=1;
  renderPage();

  document.getElementById("info").innerText =
    "Ditemukan "+filteredData.length+" berita";
}

// RESET
function resetData(){
  document.getElementById("keyword").value="";
  document.getElementById("lapus").value="";
  document.getElementById("date_from").value="";
  document.getElementById("date_to").value="";
  document.getElementById("date_to").disabled=true;

  showDefault();
}

// PAGINATION
function renderPage(){
  const start=(currentPage-1)*perPage;
  const rows=filteredData.slice(start,start+perPage);
  renderTable(rows);

  document.getElementById("page-info").innerText =
    "Page "+currentPage+" / "+Math.max(1,Math.ceil(filteredData.length/perPage));
}

function nextPage(){
  if(currentPage*perPage<filteredData.length){
    currentPage++; renderPage();
  }
}

function prevPage(){
  if(currentPage>1){
    currentPage--; renderPage();
  }
}

// SHORT TEXT
function shortText(t){
  let s=t.split(".");
  return s.slice(0,3).join(".")+"...";
}

// COPY
function copyText(e){
  navigator.clipboard.writeText(decodeURIComponent(e));
  alert("✅ Artikel berhasil dicopy");
}

// EXPAND
function toggleFull(id,e){
  let row=document.getElementById("expand-"+id);

  if(row){row.remove();return;}

  let tr=document.createElement("tr");
  tr.id="expand-"+id;
  tr.className="expand-row";

  tr.innerHTML=`<td colspan="6">${decodeURIComponent(e)}</td>`;

  document.getElementById("row-"+id).after(tr);
}

// RENDER
function renderTable(rows){
  const tbody=document.getElementById("table-body");
  tbody.innerHTML="";

  rows.forEach((d,i)=>{
    const id=(currentPage-1)*perPage+i;
    const enc=encodeURIComponent(d.artikel);

    tbody.innerHTML+=`
    <tr id="row-${id}">
      <td>${id+1}</td>
      <td>${d.date}</td>
      <td>${d.title}</td>
      <td>${shortText(d.artikel)}</td>
      <td>${getLapusFull(d.lapus)}</td>
      <td>
        <button title="Copy Artikel" onclick="copyText('${enc}')">📋</button>
        <button title="Lihat Artikel Lengkap" onclick="toggleFull(${id},'${enc}')">👁️</button>
      </td>
    </tr>`;
  });
}

// EXPORT
function exportExcel(){
  let ws=XLSX.utils.json_to_sheet(filteredData);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Berita");
  XLSX.writeFile(wb,"export.xlsx");
}
</script>

</body>
</html>
