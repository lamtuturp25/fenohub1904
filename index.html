<!DOCTYPE html>
<html>
<head>
  <title>News Dashboard</title>
</head>
<body>

<h2>News Dashboard</h2>

<!-- FILTER -->
<input type="text" id="keyword" placeholder="Search keyword">
<select id="lapus">
  <option value="">All Lapus</option>
  <option value="A">A</option>
  <option value="B">B</option>
</select>

<button onclick="filterData()">Search</button>

<p id="info"></p>

<table border="1" id="table">
  <thead>
    <tr>
      <th>Date</th>
      <th>Title</th>
      <th>Artikel</th>
      <th>Lapus</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
let data = [];

fetch("data.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    renderTable(data);
  });

function filterData() {
  const keyword = document.getElementById("keyword").value.toLowerCase();
  const lapus = document.getElementById("lapus").value;

  let filtered = data.filter(d => {
    return (
      (!keyword || d.title.toLowerCase().includes(keyword)) &&
      (!lapus || d.lapus === lapus)
    );
  });

  renderTable(filtered);
}

function renderTable(rows) {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";

  rows.forEach(d => {
    tbody.innerHTML += `
      <tr>
        <td>${d.date}</td>
        <td><a href="${d.link}" target="_blank">${d.title}</a></td>
        <td>${d.artikel}</td>
        <td>${d.lapus}</td>
      </tr>
    `;
  });

  document.getElementById("info").innerText =
    "Found " + rows.length + " articles";
}
</script>

</body>
</html>
