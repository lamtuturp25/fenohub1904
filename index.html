<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body { font-family: Arial; margin: 10px; }

input, select, button {
  padding: 5px;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

th { background: #f2f2f2; }

.date-col { width: 120px; }
.artikel-col { max-width: 400px; }

.pagination {
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- FILTER -->
<input type="text" id="keyword" placeholder="Keyword">

<input type="date" id="date_from">
<input type="date" id="date_to">

<select id="lapus">
  <option value="">All Lapus</option>
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="D">D</option>
  <option value="E">E</option>
  <option value="F">F</option>
  <option value="G">G</option>
  <option value="H">H</option>
  <option value="I">I</option>
  <option value="J">J</option>
  <option value="K">K</option>
  <option value="L">L</option>
  <option value="MN">MN</option>
  <option value="O">O</option>
  <option value="P">P</option>
  <option value="Q">Q</option>
  <option value="RSTU">RSTU</option>
</select>

<button onclick="applyFilter()">Search</button>
<button onclick="resetData()">Reset</button>
<button onclick="exportExcel()">Export Excel</button>

<p id="info"></p>

<table>
<thead>
<tr>
<th>No</th>
<th class="date-col">Date</th>
<th>Title</th>
<th class="artikel-col">Artikel</th>
<th>Lapus</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">Prev</button>
<span id="page-info"></span>
<button onclick="nextPage()">Next</button>
</div>

<script>
let data = [];
let filteredData = [];
let currentPage = 1;
const perPage = 15;

// LOAD
fetch("data.json")
.then(res => res.json())
.then(json => {
  data = json;
  data.sort((a,b)=> b.date.localeCompare(a.date));
  showDefault();
});

// DEFAULT
function showDefault(){
  const latestMonth = data[0].date.slice(0,7);
  filteredData = data.filter(d=> d.date.startsWith(latestMonth));
  currentPage = 1;
  renderPage();

  document.getElementById("info").innerText =
    "Default: bulan terbaru ("+latestMonth+")";
}

// FILTER
function applyFilter(){
  const keyword = document.getElementById("keyword").value.toLowerCase();
  const lapus = document.getElementById("lapus").value;
  const from = document.getElementById("date_from").value;
  const to = document.getElementById("date_to").value;

  filteredData = data.filter(d => {
    return (
      (!keyword || d.title.toLowerCase().includes(keyword)) &&
      (!lapus || d.lapus === lapus) &&
      (!from || d.date >= from) &&
      (!to || d.date <= to)
    );
  });

  currentPage = 1;
  renderPage();

  document.getElementById("info").innerText =
    "Ditemukan "+filteredData.length+" berita";
}

// RESET
function resetData(){
  document.getElementById("keyword").value="";
  document.getElementById("lapus").value="";
  document.getElementById("date_from").value="";
  document.getElementById("date_to").value="";

  showDefault();
}

// PAGINATION
function renderPage(){
  const start = (currentPage-1)*perPage;
  const end = start + perPage;
  const pageData = filteredData.slice(start,end);

  renderTable(pageData);

  document.getElementById("page-info").innerText =
    "Page "+currentPage+" / "+Math.ceil(filteredData.length/perPage);
}

function nextPage(){
  if(currentPage*perPage < filteredData.length){
    currentPage++;
    renderPage();
  }
}

function prevPage(){
  if(currentPage>1){
    currentPage--;
    renderPage();
  }
}

// SHORT TEXT
function shortenText(text){
  let s = text.split(".");
  return s.slice(0,3).join(".") + "...";
}

// COPY
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// FULL
function showFull(text){
  alert(text);
}

// RENDER
function renderTable(rows){
  const tbody = document.getElementById("table-body");
  tbody.innerHTML="";

  rows.forEach((d,i)=>{
    tbody.innerHTML += `
    <tr>
      <td>${(currentPage-1)*perPage + i +1}</td>
      <td>${d.date}</td>
      <td><a href="${d.link}" target="_blank">${d.title}</a></td>
      <td>${shortenText(d.artikel)}</td>
      <td>${d.lapus}</td>
      <td>
        <button onclick="copyText(\`${d.artikel}\`)">Copy</button>
        <button onclick="showFull(\`${d.artikel}\`)">Full</button>
      </td>
    </tr>`;
  });
}

// EXPORT EXCEL
function exportExcel(){
  let csv = "Date,Title,Artikel,Lapus\n";

  filteredData.forEach(d=>{
    csv += `"${d.date}","${d.title}","${d.artikel}","${d.lapus}"\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "export_berita.csv";
  a.click();
}
</script>

</body>
</html>
