<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 10px;
}

/* FILTER */
input, select, button {
  padding: 6px;
  margin: 5px;
  font-size: 14px;
}

/* TABLE DESKTOP */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  vertical-align: top;
}

th { background: #f2f2f2; }

/* WIDTH CONTROL */
th:nth-child(1) { width: 40px; }
th:nth-child(2) { width: 100px; }
th:nth-child(3) { width: 200px; }
th:nth-child(4) { width: 400px; }
th:nth-child(5) { width: 80px; }
th:nth-child(6) { width: 100px; }

td { word-wrap: break-word; }

/* EXPAND ROW */
.expand-row {
  background: #fafafa;
}

/* PAGINATION */
.pagination {
  margin-top: 10px;
}

/* ========================= */
/* 📱 MOBILE MODE */
/* ========================= */
@media (max-width: 768px) {

  table, thead, tbody, th, td, tr {
    display: block;
  }

  thead {
    display: none;
  }

  tr {
    margin-bottom: 10px;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 8px;
    background: #fff;
  }

  td {
    border: none;
    padding: 5px 0;
  }

  td::before {
    font-weight: bold;
    display: block;
    color: #555;
  }

  td:nth-child(1)::before { content: "No"; }
  td:nth-child(2)::before { content: "Date"; }
  td:nth-child(3)::before { content: "Title"; }
  td:nth-child(4)::before { content: "Artikel"; }
  td:nth-child(5)::before { content: "Lapus"; }
  td:nth-child(6)::before { content: "Aksi"; }

}
</style>
</head>

<body>

<!-- FILTER -->
<input type="text" id="keyword" placeholder="Keyword">

<input type="date" id="date_from" onchange="autoFillDateTo()">
<input type="date" id="date_to">

<select id="lapus">
<option value="">All Lapus</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
<option value="F">F</option>
<option value="G">G</option>
<option value="H">H</option>
<option value="I">I</option>
<option value="J">J</option>
<option value="K">K</option>
<option value="L">L</option>
<option value="MN">MN</option>
<option value="O">O</option>
<option value="P">P</option>
<option value="Q">Q</option>
<option value="RSTU">RSTU</option>
</select>

<button onclick="applyFilter()">Search</button>
<button onclick="resetData()">Reset</button>
<button onclick="exportExcel()">📥</button>

<p id="info"></p>

<table>
<thead>
<tr>
<th>No</th>
<th>Date</th>
<th>Title</th>
<th>Artikel</th>
<th>Lapus</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">⬅️</button>
<span id="page-info"></span>
<button onclick="nextPage()">➡️</button>
</div>

<script>
let data = [];
let filteredData = [];
let currentPage = 1;
const perPage = 15;

// LOAD
fetch("data.json")
.then(res=>res.json())
.then(json=>{
  data = json;
  data.sort((a,b)=> b.date.localeCompare(a.date));
  showDefault();
});

// DEFAULT
function showDefault(){
  const latestMonth = data[0].date.slice(0,7);
  filteredData = data.filter(d=> d.date.startsWith(latestMonth));
  currentPage=1;
  renderPage();
}

// FILTER
function applyFilter(){
  const keyword = document.getElementById("keyword").value.toLowerCase();
  const lapus = document.getElementById("lapus").value;
  const from = document.getElementById("date_from").value;
  const to = document.getElementById("date_to").value;

  filteredData = data.filter(d=>{
    return (
      (!keyword || d.title.toLowerCase().includes(keyword)) &&
      (!lapus || d.lapus === lapus) &&
      (!from || d.date >= from) &&
      (!to || d.date <= to)
    );
  });

  currentPage=1;
  renderPage();
}

// AUTO DATE
function autoFillDateTo(){
  if(data.length===0) return;
  document.getElementById("date_to").value = data[0].date;
}

// RESET
function resetData(){
  document.getElementById("keyword").value="";
  document.getElementById("lapus").value="";
  document.getElementById("date_from").value="";
  document.getElementById("date_to").value="";
  showDefault();
}

// PAGINATION
function renderPage(){
  const start=(currentPage-1)*perPage;
  const rows=filteredData.slice(start,start+perPage);
  renderTable(rows);

  document.getElementById("page-info").innerText =
    "Page "+currentPage+" / "+Math.max(1,Math.ceil(filteredData.length/perPage));
}

function nextPage(){
  if(currentPage*perPage<filteredData.length){
    currentPage++; renderPage();
  }
}

function prevPage(){
  if(currentPage>1){
    currentPage--; renderPage();
  }
}

// SHORT TEXT
function shortText(text){
  let s=text.split(".");
  return s.slice(0,3).join(".")+"...";
}

// COPY
function copyText(encoded){
  navigator.clipboard.writeText(decodeURIComponent(encoded));
  alert("Copied!");
}

// TOGGLE FULL
function toggleFull(id, encoded){
  let row = document.getElementById("expand-"+id);

  if(row){
    row.remove();
    return;
  }

  const text = decodeURIComponent(encoded);

  const tr = document.createElement("tr");
  tr.id = "expand-"+id;
  tr.className = "expand-row";

  tr.innerHTML = `<td colspan="6">${text}</td>`;

  document.getElementById("row-"+id).after(tr);
}

// RENDER
function renderTable(rows){
  const tbody=document.getElementById("table-body");
  tbody.innerHTML="";

  rows.forEach((d,i)=>{
    const id = (currentPage-1)*perPage + i;
    const encoded = encodeURIComponent(d.artikel);

    tbody.innerHTML += `
    <tr id="row-${id}">
      <td>${id+1}</td>
      <td>${d.date}</td>
      <td>${d.title}</td>
      <td>${shortText(d.artikel)}</td>
      <td>${d.lapus}</td>
      <td>
        <button onclick="copyText('${encoded}')">📋</button>
        <button onclick="toggleFull(${id}, '${encoded}')">👁️</button>
      </td>
    </tr>`;
  });
}

// EXPORT
function exportExcel(){
  let ws = XLSX.utils.json_to_sheet(filteredData);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Berita");
  XLSX.writeFile(wb, "export.xlsx");
}
</script>

</body>
</html>
